# ============================================================
# hostapd — WiFi Access Point Configuration
# Survivalist LLM Server
#
# ⚠  INTERFACE and WPA_PASSPHRASE are replaced at install time
#    by setup.sh. Do not edit manually after installation.
# ============================================================

# Wireless interface name (e.g. wlan0, wlp2s0)
# REPLACED_BY_SETUP: interface=WLAN_INTERFACE
interface=wlan0

# Kernel driver — nl80211 works for all modern Linux wireless drivers
driver=nl80211

# ── Network Identity ───────────────────────────────────────
ssid=SurvivalistLLM
# Hide the SSID beacon (set to 1 for stealth mode)
ignore_broadcast_ssid=0

# ── Radio Settings ─────────────────────────────────────────
# hw_mode: g = 2.4 GHz (maximum device compatibility)
#           a = 5 GHz  (faster but shorter range, fewer old devices)
hw_mode=g
channel=6

# Country code — change to your 2-letter ISO country code.
# Incorrect values may violate radio regulations.
country_code=US
ieee80211d=1
ieee80211h=0

# WMM (QoS) — enable for 802.11n compatibility
wmm_enabled=1

# 802.11n support (comment out if your adapter doesn't support it)
ieee80211n=1
ht_capab=[HT40][SHORT-GI-20][SHORT-GI-40]

# ── Access Control ─────────────────────────────────────────
# Accept all MAC addresses (0 = accept unless in deny list)
macaddr_acl=0

# ── Authentication ─────────────────────────────────────────
# auth_algs: 1 = WPA/WPA2 only (no WEP)
auth_algs=1

# WPA2-Personal (PSK)
wpa=2
# REPLACED_BY_SETUP: wpa_passphrase=WIFI_PASSWORD
wpa_passphrase=survival2025!
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP TKIP
rsn_pairwise=CCMP

# ── Performance Tuning ─────────────────────────────────────
# Limit to 10 clients — enough for a family/squad without overloading
max_num_sta=10
# Disconnect idle clients after 300 s to free resources
ap_max_inactivity=300

# Logging (0=verbose … 4=quiet) — keep at 2 for debugging, raise to 3 in prod
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
