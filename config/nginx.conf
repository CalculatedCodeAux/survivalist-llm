# ============================================================
# nginx — Reverse Proxy for Survivalist LLM
#
# Routes:
#   /          → Open WebUI (chat interface)
#   /admin     → survivorpack-admin Flask service
#   /library   → kiwix-serve (offline ZIM browser)
#   /emergency → static emergency UI (iframe + legal disclaimer)
#
# Also handles captive-portal redirect so phones auto-open
# the LLM page when joining the WiFi network.
# ============================================================

worker_processes auto;
worker_rlimit_nofile 512;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 64;
    multi_accept off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Minimal logging format
    log_format  main  '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;

    # Pack uploads can be up to a full ZIM file (1-3GB typical).
    # This limit applies globally; the /admin route is the only large upload path.
    client_max_body_size 4G;

    # Gzip compression — globally on; /library and /admin can use it freely.
    # The location / block disables upstream gzip (Accept-Encoding "") so
    # sub_filter can inject the SurvivorOS nav and disclaimer into Open WebUI.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── WebSocket support (required by Open WebUI) ─────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstreams ──────────────────────────────────────────
    upstream open_webui {
        server 127.0.0.1:8080;
        keepalive 4;
    }

    upstream kiwix_serve {
        server 127.0.0.1:8888;
        keepalive 2;
    }

    upstream pack_admin {
        server 127.0.0.1:5000;
        keepalive 2;
    }

    # ── Main server block ──────────────────────────────────
    server {
        # Dev: listens on localhost only so it doesn't intercept traffic on
        # wired/WiFi interfaces. setup.sh patches this to "80 default_server"
        # on the device so WiFi clients can connect.
        listen 127.0.0.1:80;
        server_name _;

        # ── Captive portal probes ──────────────────────────
        # iOS, Android, Windows probe these URLs to detect internet access.
        # Return success so devices redirect to the chat UI instead of
        # showing a "no internet" warning.
        location /generate_204         { return 204; }
        location /gen_204              { return 204; }
        location /connecttest.txt      { return 200 "Microsoft NCSI"; }
        location /ncsi.txt             { return 200 "Microsoft NCSI"; }
        location /hotspot-detect.html  {
            return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        }
        location /success.txt          { return 200 "success\n"; }
        location /canonical.html       { return 200; }

        # ── Admin UI (/admin) ──────────────────────────────
        # Pack management: install, activate, deactivate, uninstall domain packs.
        # No authentication — device is LAN-only (≤100ft off-grid, WiFi AP).
        location /admin {
            proxy_pass         http://pack_admin;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Pack uploads are large — 60 min timeout for multi-GB ZIM uploads
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            proxy_buffering off;
        }

        # ── Kiwix offline library (/library + internal kiwix paths) ──────
        # Browses ZIM files (Wikipedia, WikiHow, domain pack content).
        #
        # kiwix-serve redirects /library → /content/library internally.
        # All of its sub-paths (/content, /catalog, /search, /suggest,
        # /skin, /raw) must also be proxied here, otherwise the browser
        # follows the redirect to /content/... which falls through to
        # Open WebUI (the default location / block).
        location ~ ^/(library|content|catalog|search|suggest|skin|raw)(/|$) {
            proxy_pass         http://kiwix_serve;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
            proxy_connect_timeout 10s;

            # ZIM content is not streamed — buffering is fine
            proxy_buffering on;
        }

        # ── Emergency UI (/emergency) ──────────────────────
        # Static page: persistent legal disclaimer banner + iframe to main chat UI.
        # Font size ≥ 24px, white on black, touch targets ≥ 48px.
        # Attorney must approve disclaimer copy before launch.
        location /emergency {
            alias /opt/survivalist-llm/emergency;
            index index.html;
            try_files $uri $uri/ /emergency/index.html;
        }

        # ── Main chat UI (/) ───────────────────────────────
        # All other traffic → Open WebUI (chat interface)
        location / {
            proxy_pass         http://open_webui;
            proxy_http_version 1.1;

            # WebSocket headers
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — LLM inference can be slow on CPU
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # Disable upstream gzip so sub_filter can inject the SurvivorOS chrome.
            # (nginx still gzips its own response to the client; only the
            # proxy→nginx leg is uncompressed.)
            proxy_set_header   Accept-Encoding "";

            # ── SurvivorOS chrome injection ───────────────────────────────
            # Injects nav bar, CSS overlap fix, and disclaimer into Open WebUI.
            # Scoped to location / so /admin and /emergency are not affected.
            #
            # Disclaimer copy: v1.0 (2026-03-24) — attorney-reviewed.
            # Do not change disclaimer text without new legal sign-off.
            sub_filter_once on;
            sub_filter '</body>' '<style>.app>div{height:calc(100vh - 96px)!important;max-height:calc(100dvh - 96px)!important;margin-top:44px!important;}#chat-container{height:100%!important;max-height:100%!important;}</style><nav id="survivoros-topnav" style="position:fixed;top:0;left:0;right:0;z-index:99998;height:44px;background:#1C1A17;display:flex;align-items:center;padding:0 16px;gap:4px;border-bottom:2px solid #D4570A;font-family:system-ui,sans-serif;"><span style="color:#D4570A;font-weight:700;font-size:14px;letter-spacing:.05em;flex:none;margin-right:16px;">SurvivorOS</span><a href="/" style="color:#F7F5F0;font-size:13px;font-weight:500;text-decoration:none;padding:6px 12px;border-radius:4px;">Chat</a><a href="/library" style="color:#F7F5F0;font-size:13px;font-weight:500;text-decoration:none;padding:6px 12px;border-radius:4px;">Library</a><a href="/admin" style="color:#F7F5F0;font-size:13px;font-weight:500;text-decoration:none;padding:6px 12px;border-radius:4px;">Admin</a></nav><div id="survivoros-disclaimer" style="position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#111;color:#fff;padding:8px 14px;font-family:system-ui,sans-serif;font-size:14px;line-height:1.4;border-top:3px solid #c00;"><strong style="color:#ff6666;">&#9888; NOT MEDICAL OR SAFETY ADVICE.</strong> AI can be wrong or dangerous. Verify anything critical. Emergency? <strong>Call 911.</strong> <a href="/library" style="color:#7bc8ff;margin-left:8px;">Offline Library &rarr;</a></div></body>';

            # Streaming responses (token-by-token output)
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
