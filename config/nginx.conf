# ============================================================
# nginx — Reverse Proxy for Survivalist LLM
# Sits on port 80, forwards to Open WebUI on port 8080.
# Also handles the captive-portal redirect so phones auto-open
# the LLM page when joining the WiFi.
# ============================================================

worker_processes auto;
worker_rlimit_nofile 512;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 64;
    multi_accept off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Minimal logging format
    log_format  main  '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;   # Allow image/document uploads to the LLM

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── WebSocket support (required by Open WebUI) ─────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream: Open WebUI container ────────────────────
    upstream open_webui {
        server 127.0.0.1:8080;
        keepalive 4;
    }

    # ── Main server block ──────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # Captive portal endpoints — iOS, Android, Windows all probe
        # these to detect internet access.  Return 200 so they redirect
        # to the LLM UI instead of showing a "no internet" warning.
        location /generate_204         { return 204; }
        location /gen_204              { return 204; }
        location /connecttest.txt      { return 200 "Microsoft NCSI"; }
        location /ncsi.txt             { return 200 "Microsoft NCSI"; }
        location /hotspot-detect.html  {
            return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        }
        location /success.txt          { return 200 "success\n"; }
        location /canonical.html       { return 200; }

        # All other traffic → Open WebUI
        location / {
            proxy_pass         http://open_webui;
            proxy_http_version 1.1;

            # WebSocket headers
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — LLM inference can be slow on CPU
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # Streaming responses (token-by-token output)
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
