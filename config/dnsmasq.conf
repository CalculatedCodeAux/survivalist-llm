# ============================================================
# dnsmasq — DHCP + DNS for Survivalist LLM WiFi Hotspot
#
# ⚠  INTERFACE and AP_IP are replaced at install time by setup.sh.
# ============================================================

# ── Interface binding ──────────────────────────────────────
# Only listen on the AP interface; never touch the upstream/WAN interface.
# REPLACED_BY_SETUP: interface=WLAN_INTERFACE
interface=wlan0
bind-interfaces

# Disable DNS for other interfaces (we're offline anyway)
no-resolv
no-poll

# ── DHCP Pool ──────────────────────────────────────────────
# Assign IPs in .100–.200 range; 12-hour lease.
# REPLACED_BY_SETUP: dhcp-range=AP_DHCP_RANGE
dhcp-range=192.168.50.100,192.168.50.200,255.255.255.0,12h

# Server's own IP (gateway + DNS for clients)
# REPLACED_BY_SETUP: dhcp-option=3,AP_IP
dhcp-option=3,192.168.50.1          # Default gateway
# REPLACED_BY_SETUP: dhcp-option=6,AP_IP
dhcp-option=6,192.168.50.1          # DNS server

# ── DNS: Captive-Portal Redirect ───────────────────────────
# Resolve ALL domain names to the server IP.
# This means http://any-domain/ will land on the WebUI — no typing required.
address=/#/192.168.50.1

# ── Friendly hostname ──────────────────────────────────────
# Clients can reach the server at http://llm.local/
# REPLACED_BY_SETUP: address=/llm.local/AP_IP
address=/llm.local/192.168.50.1
address=/chat.local/192.168.50.1

# ── Hardening ──────────────────────────────────────────────
# Don't forward short/local names upstream (we're offline)
domain-needed
bogus-priv
# Don't read /etc/hosts for DNS (keep it clean)
no-hosts
# Maximum DHCP leases stored
dhcp-lease-max=50

# ── Logging ────────────────────────────────────────────────
log-queries
log-dhcp
# Log to syslog (journalctl -u dnsmasq)
log-facility=/var/log/dnsmasq.log
